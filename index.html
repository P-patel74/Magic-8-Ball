<!DOCTYPE html>
<html>
  <head>
    <title>Magic 8 Ball</title>

    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
  </head>

  <body>
    <div class="main">
      <h1>Magic 8 Ball</h1>
      <hr />
      <p id="info">
        Type in a yes/no question and then click the Magic 8 Ball to get yor
        answer.
      </p>
      <p><strong>Question:</strong></p>
      <input id="user_in" type="text" /><span id="error_msg"> </span>
      <p><div class="image-container">
        <img src="magic-8-ball.png" alt="ball_img" />
        <button id="btn"></button>
      </div></p>
      <p><strong>Answer: </strong><span id="ans"> </span></p>
    </div>
  </body>
</html>
